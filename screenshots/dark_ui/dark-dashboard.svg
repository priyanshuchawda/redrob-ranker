  <g>
    <rect x="326" y="394" width="310" height="54" rx="12" fill="#111c2f" stroke="#334155"/><text x="344" y="416" class="label">MUST HAVE</text><text x="344" y="438" class="chip">Python • FastAPI • vector search • ranking</text>
    <rect x="656" y="394" width="330" height="54" rx="12" fill="#111c2f" stroke="#334155"/><text x="674" y="416" class="label">STRONG SIGNALS</text><text x="674" y="438" class="chip">retrieval systems • candidate matching</text>
    <rect x="1006" y="394" width="330" height="54" rx="12" fill="#111c2f" stroke="#334155"/><text x="1024" y="416" class="label">GOOD TO HAVE</text><text x="1024" y="438" class="chip">Kubernetes • MLOps • recommender systems</text>
    <rect x="326" y="464" width="310" height="46" rx="12" fill="#111c2f" stroke="#334155"/><text x="344" y="492" class="body">Location: Pune or Bangalore, India</text>
    <rect x="656" y="464" width="330" height="46" rx="12" fill="#111c2f" stroke="#334155"/><text x="674" y="492" class="body">Notice under 45 days</text>
    <rect x="1006" y="464" width="330" height="46" rx="12" fill="#111c2f" stroke="#334155"/><text x="1024" y="492" class="body">Risk blockers: no production ownership</text>
  </g>
  <rect x="300" y="570" width="1076" height="250" rx="20" fill="#0c1a2e" stroke="#253756" filter="url(#shadow)"/>

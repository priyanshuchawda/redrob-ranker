  <line x1="326" y1="626" x2="1348" y2="626" stroke="#253756"/>
  <text x="326" y="662" class="table">1</text><text x="398" y="662" class="table">CAND_DEMO_001</text><text x="560" y="662" class="table">100</text><text x="650" y="662" class="table">100</text><text x="730" y="662" class="table">47</text><text x="830" y="662" class="chip">Low</text><text x="950" y="662" class="table">No major blocker</text><text x="1130" y="662" class="body">Production search and matching proof</text>
  <text x="326" y="716" class="table">2</text><text x="398" y="716" class="table">CAND_DEMO_002</text><text x="560" y="716" class="table">87</text><text x="650" y="716" class="table">62</text><text x="730" y="716" class="table">19</text><text x="830" y="716" class="chip">Review</text><text x="950" y="716" class="table">Weak ranking evidence</text><text x="1130" y="716" class="body">Backend proof; ranking depth unclear</text>
  <text x="326" y="770" class="table">3</text><text x="398" y="770" class="table">CAND_DEMO_004</text><text x="560" y="770" class="table">59</text><text x="650" y="770" class="table">90</text><text x="730" y="770" class="table">34</text><text x="830" y="770" fill="#fecaca" font-family="Arial" font-weight="700" font-size="14">High</text><text x="950" y="770" class="table">Missing production proof</text><text x="1130" y="770" class="body">Hybrid search with location risk</text>
</svg>

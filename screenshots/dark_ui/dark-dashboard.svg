<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".35"/></filter>
    <style>
      .h1{font:700 34px Arial,sans-serif;fill:#f8fafc}.h2{font:700 18px Arial,sans-serif;fill:#f8fafc}
      .label{font:700 12px Arial,sans-serif;fill:#94a3b8;letter-spacing:.04em}.body{font:500 15px Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 30px Arial,sans-serif;fill:#fff}.small{font:600 12px Arial,sans-serif;fill:#a5b4fc}
      .chip{font:700 12px Arial,sans-serif;fill:#dbeafe}.table{font:600 14px Arial,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1440" height="900" fill="#07111f"/>
  <rect x="20" y="20" width="236" height="860" rx="22" fill="#0f172a" stroke="#1e293b"/>
  <text x="52" y="66" class="h2">Recruiter Intelligence</text><text x="52" y="88" class="small">EvidenceGraph Ranker</text>
  <rect x="42" y="132" width="172" height="42" rx="10" fill="#2563eb"/><text x="66" y="158" class="table">Dashboard</text>
  <text x="66" y="214" class="body">Run Ranking</text><text x="66" y="264" class="body">Candidates</text><text x="66" y="314" class="body">Compare</text><text x="66" y="364" class="body">Trust Audit</text><text x="66" y="414" class="body">Exports</text>
  <text x="300" y="72" class="h1">Dashboard</text><text x="300" y="100" class="body">Source: FastAPI backend • Intended dataset</text>
  <g filter="url(#shadow)">
    <rect x="300" y="136" width="196" height="128" rx="18" fill="#111c2f" stroke="#253756"/><text x="324" y="168" class="label">TOTAL CANDIDATES</text><text x="324" y="210" class="num">4</text><text x="324" y="238" class="body">Loaded into ranking run</text>
    <rect x="520" y="136" width="196" height="128" rx="18" fill="#111c2f" stroke="#253756"/><text x="544" y="168" class="label">SHORTLISTED</text><text x="544" y="210" class="num">4</text><text x="544" y="238" class="body">Visible ranked candidates</text>
    <rect x="740" y="136" width="196" height="128" rx="18" fill="#111c2f" stroke="#253756"/><text x="764" y="168" class="label">AVG CONFIDENCE</text><text x="764" y="210" class="num">41</text><text x="764" y="238" class="body">Normalized score</text>
    <rect x="960" y="136" width="196" height="128" rx="18" fill="#111c2f" stroke="#253756"/><text x="984" y="168" class="label">HIGH RISK</text><text x="984" y="210" class="num">2</text><text x="984" y="238" class="body">Profiles requiring review</text>
    <rect x="1180" y="136" width="196" height="128" rx="18" fill="#111c2f" stroke="#253756"/><text x="1204" y="168" class="label">RUNTIME</text><text x="1204" y="210" class="num">0.10s</text><text x="1204" y="238" class="body">Backend ranking time</text>
  </g>
  <rect x="300" y="300" width="1076" height="236" rx="20" fill="#0c1a2e" stroke="#1d4ed8" filter="url(#shadow)"/>

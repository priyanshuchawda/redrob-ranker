# Copy to submission_metadata.yaml and fill private/team-specific fields before upload.

team_name: "your-team-name"

primary_contact:
  name: "Full Name"
  email: "primary@example.com"
  phone: "+91-XXXXXXXXXX"

team_members:
  - name: "Full Name"
    email: "member@example.com"
    role: "Team Lead"

github_repo: "https://github.com/priyanshuchawda/redrob-ranker"
sandbox_link: "TBD"
reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

compute:
  platform: "Windows local machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.13.12"
  os: "Windows"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
  Used AI assistance for implementation planning, code generation, and review.
  No ranking-time hosted AI calls are made by the submitted system.

methodology_summary: |
  Deterministic hybrid ranker for the Senior AI Engineer JD. It extracts career-history
  evidence for retrieval, ranking, recommendation systems, search, evaluation, and product
  ML work; combines it with seniority, product-company, logistics, and Redrob behavioral
  signals; and applies penalties for keyword stuffing, suspicious skill claims, stale
  profiles, poor response rates, service-only trajectories, and logistics risk. Reasoning
  strings are generated from candidate facts only.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true


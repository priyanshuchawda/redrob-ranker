# Copy to submission_metadata.yaml and fill private/team-specific fields before upload.

team_name: "AllKnighters"

primary_contact:
  name: "PROVIDE_REAL_PRIMARY_CONTACT_NAME_BEFORE_UPLOAD"
  email: "PROVIDE_REAL_PRIMARY_CONTACT_EMAIL_BEFORE_UPLOAD"
  phone: "PROVIDE_REAL_PRIMARY_CONTACT_PHONE_BEFORE_UPLOAD"

team_members:
  - name: "PROVIDE_REAL_TEAM_MEMBER_NAME_BEFORE_UPLOAD"
    email: "PROVIDE_REAL_TEAM_MEMBER_EMAIL_BEFORE_UPLOAD"
    role: "Team Lead"

github_repo: "https://github.com/priyanshuchawda/redrob-ranker"
sandbox_link: "PROVIDE_REAL_SANDBOX_LINK_BEFORE_UPLOAD"
reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

compute:
  platform: "Windows local machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.13.12"
  os: "Windows"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
  Used AI assistance for implementation planning, code generation, and review.
  No ranking-time hosted AI calls are made by the submitted system.

methodology_summary: |
  Deterministic EvidenceGraph ranker for the Senior AI Engineer JD. It groups synonymous
  career phrases into bounded retrieval, ranking, recommendation, matching, and evaluation
  concepts; weights current production ownership above old or profile-only claims; verifies
  skills through duration, assessments, endorsements, and career corroboration; combines
  fit with product, logistics, and Redrob behavioral signals; and applies adversarial risk
  controls. Reasoning strings are generated from candidate facts only.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
